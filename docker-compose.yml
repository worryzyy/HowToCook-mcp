services:
  howtocook-mcp:
    build: .
    image: howtocook-mcp:latest
    container_name: howtocook-mcp
    ports:
      # 宿主机端口:容器端口（3000 被占用时改左边即可）
      - "3000:3000"
    # 默认 HTTP 模式（/mcp 端点）；改用 SSE 模式请换成:
    # command: ["--transport", "sse", "--port", "3000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
